<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a000c"/>
      <stop offset="50%" stop-color="#7a0418"/>
      <stop offset="100%" stop-color="#C8102E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="-0.1" r="0.6">
      <stop offset="0%" stop-color="rgba(218,226,107,0.35)"/>
      <stop offset="100%" stop-color="rgba(218,226,107,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1.05" cy="1.15" r="0.55">
      <stop offset="0%" stop-color="rgba(255,89,112,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,89,112,0)"/>
    </radialGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DAE26B"/>
      <stop offset="100%" stop-color="#BFC74A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- wordmark -->
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="220" letter-spacing="-10" fill="#FFF6F2">TIPJAR<tspan fill="#DAE26B">.</tspan></text>

  <!-- subtitle -->
  <text x="86" y="395" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="8" fill="#DAE26B">ON-CHAIN TIP JAR &#183; BASE SEPOLIA</text>

  <!-- pill -->
  <rect x="80" y="445" width="380" height="56" rx="28" fill="rgba(0,0,0,0.35)" stroke="rgba(218,226,107,0.45)" stroke-width="1.5"/>
  <text x="270" y="481" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="22" letter-spacing="3" fill="#FFF6F2">DROP A TIP &#8594;</text>

  <!-- jar illustration -->
  <g transform="translate(880, 200)">
    <rect x="-6" y="-30" width="220" height="44" rx="14" fill="#FFF6F2"/>
    <rect x="60" y="-15" width="88" height="12" rx="6" fill="#4a000c"/>
    <path d="M0 14h208v176a40 40 0 0 1-40 40H40a40 40 0 0 1-40-40V14z" fill="rgba(255,246,242,0.12)" stroke="#FFF6F2" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="104" cy="120" r="44" fill="url(#coin)" stroke="#7A8420" stroke-width="6"/>
    <text x="104" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="56" fill="#1a1d04">&#926;</text>
  </g>
